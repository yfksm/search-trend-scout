version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: trends
      POSTGRES_USER: trends
      POSTGRES_PASSWORD: trends
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trends -d trends"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    environment:
      - DATABASE_URL=postgresql+asyncpg://trends:trends@db:5432/trends
      - SYNC_DATABASE_URL=postgresql://trends:trends@db:5432/trends
      - LLM_PROVIDER=openai
      - LLM_API_KEY=${LLM_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
